name: SonarQube Cloud Analysis

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: certydb
          POSTGRES_USER: certyuser
          POSTGRES_PASSWORD: certypass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-django Pillow twilio

      - name: Run tests with coverage
        continue-on-error: true
        env:
          SECRET_KEY: django-insecure-ci-key-only-for-testing-not-production
          DB_NAME: certydb
          DB_USER: certyuser
          DB_PASSWORD: certypass
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          pytest --cov=. --cov-report=xml:coverage.xml -v

      - name: Verify coverage file
        run: |
          ls -la coverage.xml || echo "WARNING: coverage.xml not found"
          head -10 coverage.xml || echo "coverage.xml is empty or missing"

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
